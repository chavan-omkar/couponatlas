name: DB Setup

# Run this ONCE manually when schema changes.
# Never runs automatically — keeps scrape workflow clean.
on:
  workflow_dispatch:
    inputs:
      reset:
        description: 'Drop all tables first? (destructive — wipes data)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  setup:
    name: Push DB Schema
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Generate Prisma client
        working-directory: backend
        run: ./node_modules/.bin/prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Drop all tables (only if reset=true)
        if: github.event.inputs.reset == 'true'
        working-directory: backend
        run: |
          node -e "
          const { PrismaClient } = require('@prisma/client');
          const prisma = new PrismaClient();
          prisma.\$executeRawUnsafe('DROP TABLE IF EXISTS \"CouponCategory\" CASCADE')
            .then(() => prisma.\$executeRawUnsafe('DROP TABLE IF EXISTS \"Coupon\" CASCADE'))
            .then(() => prisma.\$executeRawUnsafe('DROP TABLE IF EXISTS \"ScrapeJob\" CASCADE'))
            .then(() => prisma.\$executeRawUnsafe('DROP TABLE IF EXISTS \"Category\" CASCADE'))
            .then(() => prisma.\$executeRawUnsafe('DROP TABLE IF EXISTS \"Merchant\" CASCADE'))
            .then(() => { console.log('All tables dropped'); return prisma.\$disconnect(); })
            .catch(e => { console.error(e.message); process.exit(1); });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Push schema
        working-directory: backend
        run: ./node_modules/.bin/prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

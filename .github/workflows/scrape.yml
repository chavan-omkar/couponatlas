name: Scrape Coupons

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours

  workflow_dispatch:
    inputs:
      source:
        description: 'Which source to scrape (leave empty for all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - coupondunia
          - grabon
          - couponzguru
          - food-direct

jobs:
  scrape:
    name: Scrape — ${{ matrix.source }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Run all scrapers in parallel — each in its own job
    strategy:
      fail-fast: false   # if one scraper fails, others keep running
      matrix:
        source:
          - coupondunia
          - grabon
          - couponzguru
          - food-direct

    # Skip sources not selected in manual trigger
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.source == 'all' ||
      github.event.inputs.source == matrix.source

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Install Playwright + Chromium
        working-directory: backend
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Push DB schema (safe, idempotent)
        working-directory: backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run scraper — ${{ matrix.source }}
        working-directory: backend
        run: node scripts/scrape.js ${{ matrix.source }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production

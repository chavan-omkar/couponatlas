name: Scrape Coupons

on:
  # Run every 6 hours automatically
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual trigger from GitHub Actions UI (Actions tab → Run workflow)
  workflow_dispatch:
    inputs:
      source:
        description: 'Which source to scrape'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - coupondunia
          - grabon

jobs:
  scrape:
    name: Run Scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Install Playwright + Chromium
        working-directory: backend
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run DB migrations (safe — skips if up to date)
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run scrapers
        working-directory: backend
        run: node scripts/scrape.js ${{ github.event.inputs.source || 'all' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
